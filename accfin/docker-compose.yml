# Phase 1 infrastructure — local development
# Production reference: platform_dox/11_Deployment_Operations_Runbook.md Appendix 20

name: accfin

services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend
    labels:
      - "traefik.docker.network=accfin_frontend"

  finance-ui:
    build:
      context: ../finance-ui
      dockerfile: Dockerfile
      args:
        PUBLIC_API_URL: https://finance.mmlogistix.bp0.work
        PUBLIC_SSE_URL: https://finance.mmlogistix.bp0.work/events/stream
    container_name: finance-ui
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      NODE_ENV: production
    networks:
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=accfin_frontend"
      - "traefik.http.routers.finance-ui.rule=Host(`finance.mmlogistix.bp0.work`)"
      - "traefik.http.routers.finance-ui.entrypoints=websecure"
      - "traefik.http.routers.finance-ui.tls=true"
      - "traefik.http.routers.finance-ui.tls.certresolver=letsencrypt"
      - "traefik.http.services.finance-ui.loadbalancer.server.port=3000"

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FINANCE_MAIL__ATTACHMENT_STORAGE_PATH: /data/attachments
    volumes:
      - attachment-data:/data/attachments
    ports:
      - "8000:8000"
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=false"

  accounts-worker:
    build:
      context: .
      dockerfile: workers/accounts/Dockerfile
    container_name: accounts-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FINANCE_ACCOUNTS_WORKER__ENABLED: "true"
      FINANCE_HERMES__BASE_URL: http://hermes:8001
    ports:
      - "8010:8010"
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      hermes:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ar-worker:
    build:
      context: .
      dockerfile: workers/ar/Dockerfile
    container_name: ar-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FINANCE_AR_WORKER__ENABLED: "true"
      FINANCE_HERMES__BASE_URL: http://hermes:8001
    ports:
      - "8011:8011"
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      hermes:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ap-worker:
    build:
      context: .
      dockerfile: workers/ap/Dockerfile
    container_name: ap-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FINANCE_AP_WORKER__ENABLED: "true"
      FINANCE_HERMES__BASE_URL: http://hermes:8001
    ports:
      - "8012:8012"
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      hermes:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  treasury-worker:
    build:
      context: .
      dockerfile: workers/treasury/Dockerfile
    container_name: treasury-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FINANCE_TREASURY_WORKER__ENABLED: "true"
      FINANCE_HERMES__BASE_URL: http://hermes:8001
    ports:
      - "8013:8013"
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      hermes:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: orchestrator
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FINANCE_ORCHESTRATOR__ENABLED: "true"
    ports:
      - "8003:8003"
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FINANCE_MAIL__POLL_ENABLED: "false"
      FINANCE_MAIL__ATTACHMENT_STORAGE_PATH: /data/attachments
    ports:
      - "8002:8002"
    volumes:
      - attachment-data:/data/attachments
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  hermes:
    build:
      context: .
      dockerfile: agents/Dockerfile
    container_name: hermes
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HERMES_OLLAMA_BASE_URL: http://ollama:11434
      HERMES_API_KEY: ${FINANCE_HERMES_API_KEY}
      HERMES_PORT: "8001"
    ports:
      - "8001:8001"
    networks:
      - backend
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:15-alpine
    container_name: db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${FINANCE_REDIS__PASSWORD}
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${FINANCE_REDIS__PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  expense-worker:
    build:
      context: .
      dockerfile: workers/expense/Dockerfile
    container_name: expense-worker
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8014:8014"
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8014/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:v2.51
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - backend
    depends_on:
      fastapi:
        condition: service_healthy

  grafana:
    profiles: [monitoring]
    image: grafana/grafana:11.0.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - backend
    depends_on:
      - prometheus

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - backend
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  db-data:
  redis-data:
  ollama-models:
  attachment-data:
  prometheus-data:
  grafana-data:
