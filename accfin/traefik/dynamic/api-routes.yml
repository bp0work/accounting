# All FastAPI traffic under /api — finance-ui owns /, /login, /approvals, /cases/{id}, etc.
# Do NOT add PathPrefix(`/`) (matches every path and steals `/` from finance-ui).
http:
  routers:
    finance-api:
      rule: "Host(`finance.mmlogistix.bp0.work`) && PathPrefix(`/api`)"
      entryPoints:
        - websecure
      service: finance-api
      tls:
        certResolver: letsencrypt
      priority: 100
      middlewares:
        - security-headers@file
  services:
    finance-api:
      loadBalancer:
        servers:
          - url: http://fastapi:8000
