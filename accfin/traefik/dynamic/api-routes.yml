http:
  routers:
    finance-api:
      rule: >-
        Host(`finance.mmlogistix.bp0.work`) && (
          PathPrefix(`/auth`) || PathPrefix(`/mail`) || PathPrefix(`/approvals`) ||
          PathPrefix(`/cases`) || PathPrefix(`/audit-logs`) || PathPrefix(`/events`) ||
          PathPrefix(`/health`) || PathPrefix(`/metrics`) || PathPrefix(`/internal`) ||
          PathPrefix(`/expense-claims`) || PathPrefix(`/reconciliation`) ||
          PathPrefix(`/notification`) || PathPrefix(`/users`) || PathPrefix(`/workflow`) ||
          PathPrefix(`/policies`)
        )
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: fastapi-service
      priority: 100
  services:
    fastapi-service:
      loadBalancer:
        servers:
          - url: http://fastapi:8000
