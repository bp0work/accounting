# Production Traefik — bp0.work (VPS 153.92.4.121)
# DNS (MVP): finance.mmlogistix.bp0.work → VPS. Post-MVP: admin.bp0.work, admin.mmlogistix.bp0.work.
# FastAPI: internal only; API paths routed via traefik/dynamic/api-routes.yml.

global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
      middlewares:
        - security-headers@file

providers:
  docker:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
    network: frontend
    watch: true
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: system@bp0.work
      storage: /letsencrypt/acme.json
      tlsChallenge: {}

log:
  level: INFO

accessLog: {}
